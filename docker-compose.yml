services:
  document-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      PORT: 3000
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/document_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANUAL_DEPOT_DIR: /app/data/manual-depot
      PROCESSED_DEPOT_DIR: /app/data/processed
      DOCUMENT_STORAGE_DIR: /app/data/inbound
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: document_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - document-agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - document-agent-redis-data:/data
    restart: unless-stopped

volumes:
  document-agent-postgres-data:
  document-agent-redis-data:
